<!--
Purpose: Renders a premium status webpage at the root of the chatbot API Vercel deployment.
What it contains: Styled landing message, active ping orb, and developer dashboard redirect information.
How it fits into the broader system: Serves as the user-facing entry point when the API URL is visited directly in a web browser.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot API Service | Jun Alvior Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-dark: #121214;
        --card-dark: #1a1a1e;
        --wood-accent: #d4a373;
        --emerald-glow: #10b981;
      }
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-dark);
        color: #e4e4e7;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }
      .glow-aura {
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(212, 163, 115, 0.08) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
        pointer-events: none;
      }
      .container {
        position: relative;
        z-index: 10;
        text-align: center;
        background-color: var(--card-dark);
        border: 1px solid #2d2d34;
        border-radius: 24px;
        padding: 3rem 2.5rem;
        max-width: 440px;
        width: 90%;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background-color: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.2);
        color: var(--emerald-glow);
        padding: 0.5rem 1rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 1.5rem;
        font-family: monospace;
      }
      .status-orb {
        width: 8px;
        height: 8px;
        background-color: var(--emerald-glow);
        border-radius: 50%;
        position: relative;
      }
      .status-orb-ping {
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: var(--emerald-glow);
        border-radius: 50%;
        animation: ping 1.5s infinite;
        opacity: 0.75;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.5rem 0;
        color: #ffffff;
      }
      p {
        color: #a1a1aa;
        font-size: 0.875rem;
        line-height: 1.6;
        margin: 0 0 2rem 0;
      }
      .footer-note {
        font-size: 0.75rem;
        color: #71717a;
        border-top: 1px solid #2d2d34;
        padding-top: 1.25rem;
        margin-top: 0.5rem;
      }
      .footer-note a {
        color: var(--wood-accent);
        text-decoration: none;
        font-weight: 500;
      }
      .footer-note a:hover {
        text-decoration: underline;
      }
      @keyframes ping {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        70%, 100% {
          transform: scale(2.5);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="glow-aura"></div>
    <div class="container">
      <div class="status-pill">
        <span class="status-orb">
          <span class="status-orb-ping"></span>
        </span>
        API Operational
      </div>
      <h1>Jun Alvior Portfolio Chatbot</h1>
      <p>
        The secure serverless RAG API daemon for the interactive portfolio chat system is active, warm, and operational.
      </p>
      <div class="footer-note">
        Maintained by <a href="https://property360-2.github.io/quick-portfolio/" target="_blank">Jun Alvior</a>
      </div>
    </div>
  </body>
</html>
